<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tier List</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#1e1e1e;
    color:white;
    padding:20px;
}

h1{
    text-align:center;
    margin-bottom:20px;
}

.controls{
    text-align:center;
    margin-bottom:20px;
}

input[type=file]{
    display:none;
}

.upload-btn{
    background:#4CAF50;
    padding:12px 20px;
    border-radius:8px;
    cursor:pointer;
    display:inline-block;
    font-weight:bold;
}

.tier{
    display:flex;
    min-height:120px;
    margin-bottom:8px;
    border-radius:8px;
    overflow:hidden;
}

.rank{
    width:90px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:32px;
    font-weight:bold;
    color:black;
}

.s{background:#ff7f7f;}
.a{background:#ffbf66;}
.b{background:#ffff66;}
.c{background:#8cff66;}
.d{background:#66ccff;}

.items{
    flex:1;
    background:#2d2d2d;
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    padding:8px;
}

.pool{
    margin-top:25px;
}

.pool-title{
    margin-bottom:10px;
    font-size:20px;
}

.image-item{
    width:100px;
    height:100px;
    border-radius:8px;
    overflow:hidden;
    cursor:grab;
    border:2px solid #444;
}

.image-item img{
    width:100%;
    height:100%;
    object-fit:cover;
    pointer-events:none;
}
</style>
</head>
<body>

<h1>Tier List</h1>

<div class="controls">
    <label class="upload-btn">
        Upload Images
        <input type="file" id="imageInput" multiple accept="image/*">
    </label>
</div>

<div class="tier">
    <div class="rank s">S</div>
    <div class="items dropzone"></div>
</div>

<div class="tier">
    <div class="rank a">A</div>
    <div class="items dropzone"></div>
</div>

<div class="tier">
    <div class="rank b">B</div>
    <div class="items dropzone"></div>
</div>

<div class="tier">
    <div class="rank c">C</div>
    <div class="items dropzone"></div>
</div>

<div class="tier">
    <div class="rank d">D</div>
    <div class="items dropzone"></div>
</div>

<div class="pool">
    <div class="pool-title">Unranked</div>
    <div class="items dropzone" id="pool"></div>
</div>

<script>
const imageInput = document.getElementById("imageInput");
const pool = document.getElementById("pool");

imageInput.addEventListener("change", e => {

    [...e.target.files].forEach(file => {

        const reader = new FileReader();

        reader.onload = function(event){

            const item = document.createElement("div");
            item.className = "image-item";
            item.draggable = true;

            item.innerHTML = `<img src="${event.target.result}">`;

            item.addEventListener("dragstart", () => {
                item.classList.add("dragging");
            });

            item.addEventListener("dragend", () => {
                item.classList.remove("dragging");
            });

            pool.appendChild(item);
        };

        reader.readAsDataURL(file);
    });
});

document.querySelectorAll(".dropzone").forEach(zone => {

    zone.addEventListener("dragover", e => {
        e.preventDefault();
    });

    zone.addEventListener("drop", e => {
        e.preventDefault();

        const dragged =
            document.querySelector(".dragging");

        if(dragged){
            zone.appendChild(dragged);
        }
    });

});
</script>

</body>
</html>
